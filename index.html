<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol Haber Merkezi | Admin & Giriş</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; }
        header { background: #000; padding: 15px; border-bottom: 2px solid #00ff88; display: flex; justify-content: space-between; align-items: center; }
        .admin-btn { background: #00ff88; color: black; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; text-decoration: none; font-size: 12px; }
        .container { max-width: 800px; margin: 20px auto; padding: 20px; }
        
        /* Haber Kartları */
        .haber-kart { background: #1e1e1e; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; padding: 15px; }
        .haber-img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; background: #333; margin-bottom: 10px; }
        h2 { color: #00ff88; margin: 0; }
        
        /* Admin Paneli Modal */
        #adminPanel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto; }
        .panel-icerik { width: 90%; max-width: 500px; margin: 50px auto; background: #222; padding: 20px; border-radius: 10px; border: 1px solid #00ff88; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #333; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        .panel-btn { background: #00ff88; color: black; border: none; padding: 10px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<header>
    <div id="adminGirisButonu">
        <a href="javascript:void(0)" class="admin-btn" onclick="adminGiris()">ADMİN PANEL</a>
    </div>
    <div style="font-weight: bold; letter-spacing: 2px;">FUTBOL <span style="color: #00ff88;">HABER</span></div>
    <div>
        <button class="admin-btn" style="background: #333; color: white;" onclick="alert('Kayıt Sistemi Simülasyonu Aktif!')">KAYIT / GİRİŞ</button>
    </div>
</header>

<div class="container" id="haberlerAlani">
    <div class="haber-kart">
        <div class="haber-img" style="display: flex; align-items: center; justify-content: center;">Haber Görseli Bekleniyor...</div>
        <h2>Hoş Geldiniz!</h2>
        <p>Admin panelinden ilk haberinizi ekleyerek başlayın.</p>
    </div>
</div>

<div id="adminPanel">
    <div class="panel-icerik">
        <h2 style="text-align: center;">Yönetim Paneli</h2>
        <hr border="1" color="#333">
        <h3>Haber Ekle</h3>
        <input type="text" id="h_baslik" placeholder="Haber Başlığı">
        <input type="text" id="h_resim" placeholder="Resim URL (Link)">
        <textarea id="h_ozet" rows="3" placeholder="Kısa Özet"></textarea>
        <button class="panel-btn" onclick="haberEkle()">HABERİ YAYINLA</button>
        <br><br>
        <button class="panel-btn" style="background: #ff4444;" onclick="document.getElementById('adminPanel').style.display='none'">KAPAT</button>
    </div>
</div>

<script>
    // Şifre Kontrolü
    function adminGiris() {
        let sifre = prompt("Lütfen Admin Şifresini Girin:");
        if (sifre === "beratadminoldu123") {
            document.getElementById('adminPanel').style.display = 'block';
        } else {
            alert("Hatalı Şifre! Erişim Reddedildi.");
        }
    }

    // Haber Ekleme Fonksiyonu
    function haberEkle() {
        let baslik = document.getElementById('h_baslik').value;
        let resim = document.getElementById('h_resim').value;
        let ozet = document.getElementById('h_ozet').value;

        if(baslik == "" || ozet == "") {
            alert("Lütfen başlık ve özet alanlarını doldurun!");
            return;
        }

        let haberAlani = document.getElementById('haberlerAlani');
        
        let yeniHaber = `
            <div class="haber-kart">
                <img src="${resim || 'https://via.placeholder.com/800x400'}" class="haber-img" onerror="this.src='https://via.placeholder.com/800x400?text=Resim+Bulunamadi'">
                <h2>${baslik}</h2>
                <p>${ozet}</p>
            </div>
        `;

        haberAlani.innerHTML = yeniHaber + haberAlani.innerHTML;
        
        // Paneli kapat ve temizle
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('h_baslik').value = "";
        document.getElementById('h_resim').value = "";
        document.getElementById('h_ozet').value = "";
        
        alert("Haber başarıyla eklendi!");
    }
</script>

</body>
</html>

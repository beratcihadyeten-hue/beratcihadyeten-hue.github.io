<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartal Haber | Canlı Yorumlar</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --ana: #00ff88; --arka: #0a0a0a; --kart: #161616; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--arka); color: white; margin: 0; }
        
        header { background: #000; padding: 15px 5%; border-bottom: 2px solid var(--ana); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .btn { background: var(--ana); color: black; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .container { max-width: 1100px; margin: 20px auto; padding: 0 15px; }

        /* --- YAN YANA DÜZEN (FLEX) --- */
        .haber-wrapper { 
            display: flex; 
            gap: 20px; 
            align-items: flex-start; 
            margin-bottom: 40px;
        }

        /* Sol Taraf: Haber */
        .haber-sol { flex: 2; background: var(--kart); border-radius: 12px; overflow: hidden; border: 1px solid #222; }
        .haber-img { width: 100%; height: auto; display: block; border-bottom: 1px solid #333; }
        .haber-icerik { padding: 20px; }

        /* Sağ Taraf: Yorumlar */
        .yorum-sag { 
            flex: 1; 
            background: #000; 
            border-radius: 12px; 
            border: 1px solid var(--ana); 
            display: flex; 
            flex-direction: column;
            max-height: 500px; /* Çok uzamasın diye */
        }
        .yorum-baslik { background: var(--ana); color: black; padding: 10px; font-weight: bold; text-align: center; border-radius: 10px 10px 0 0; }
        .yorum-liste { padding: 10px; overflow-y: auto; flex-grow: 1; min-height: 200px; }
        .yorum-satiri { background: #111; padding: 8px; margin-bottom: 8px; border-radius: 5px; font-size: 13px; border-left: 3px solid var(--ana); }
        .y-ad { color: var(--ana); font-weight: bold; display: block; margin-bottom: 3px; }

        /* Alt Kısım: Yorum Yazma */
        .yorum-yaz { padding: 10px; border-top: 1px solid #333; background: #050505; }
        input { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; margin-bottom: 5px; box-sizing: border-box; }

        /* Giriş Paneli */
        #authBox { background: var(--kart); padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: center; border: 1px solid #333; }

        @media (max-width: 800px) { .haber-wrapper { flex-direction: column; } .yorum-sag { width: 100%; } }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold; font-size:24px;">KARTAL<span>WEB</span></div>
    <button class="btn" style="font-size:11px; background:#222; color:white;" onclick="adminAc()">ADMİN</button>
</header>

<div class="container">
    <div id="authBox">
        <h3>Haberleri Tartışmak İçin Giriş Yap</h3>
        <input type="text" id="logUser" placeholder="Kullanıcı Adınız" style="max-width: 300px;">
        <button class="btn" onclick="sistemeGir()">Giriş Yap</button>
    </div>

    <div id="haberAkisi">
        
        <div class="haber-wrapper">
            <article class="haber-sol">
                <img src="https://m.media-amazon.com/images/I/51rDqK-jIEL._AC_UF1000,1000_QL80_.jpg" class="haber-img">
                <div class="haber-icerik">
                    <h2>Beşiktaş'ta Yeni Transfer Gelişmesi!</h2>
                    <p>Siyah-beyazlı ekip, orta sahaya takviye için düğmeye bastı. Görüşmelerin olumlu geçtiği ve oyuncunun önümüzdeki hafta İstanbul'a geleceği öğrenildi.</p>
                </div>
            </article>

            <aside class="yorum-sag">
                <div class="yorum-baslik">CANLI YORUMLAR</div>
                <div class="yorum-liste" id="yorumlar_haber1">
                    <p style="color:#555; text-align:center;">Yükleniyor...</p>
                </div>
                
                <div class="yorum-yaz" id="yInput_haber1" style="display:none;">
                    <input type="text" id="msg_haber1" placeholder="Mesajını yaz...">
                    <button class="btn" style="width:100%; font-size:12px;" onclick="yorumGonder('haber1')">GÖNDER</button>
                </div>
            </aside>
        </div>

    </div>
</div>

<script>
    // --- FIREBASE AYARLARIN ---
    const firebaseConfig = {
      apiKey: "AIzaSyDEbenlp7KcVZ2oE90iEHTTl2oEuGFVGKs",
      authDomain: "kartalhaber-49ae6.firebaseapp.com",
      databaseURL: "https://kartalhaber-49ae6-default-rtdb.firebaseio.com",
      projectId: "kartalhaber-49ae6",
      storageBucket: "kartalhaber-49ae6.firebasestorage.app",
      messagingSenderId: "804745909398",
      appId: "1:804745909398:web:d4ecaf7174886bbe835eb7"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let aktifUser = null;

    // SİSTEME GİRİŞ
    function sistemeGir() {
        let ad = document.getElementById('logUser').value.trim();
        if(ad.length < 2) return alert("İsim yazmalısın!");
        aktifUser = ad;
        document.getElementById('authBox').innerHTML = `<h3>Hoş geldin, <span style="color:var(--ana)">${ad}</span>! İyi yorumlar.</h3>`;
        document.querySelectorAll('[id^="yInput_"]').forEach(el => el.style.display = 'block');
    }

    // YORUM GÖNDERME
    function yorumGonder(hId) {
        let m = document.getElementById('msg_' + hId).value.trim();
        if(!m) return;
        db.ref('yorumlar/' + hId).push({ isim: aktifUser, mesaj: m, t: Date.now() });
        document.getElementById('msg_' + hId).value = "";
    }

    // YORUMLARI ÇEKME (HABER 1)
    db.ref('yorumlar/haber1').on('value', (s) => {
        let data = s.val();
        let h = "";
        if(data) {
            Object.values(data).forEach(y => {
                h += `<div class="yorum-satiri"><span class="y-ad">${y.isim}:</span>${y.mesaj}</div>`;
            });
        } else { h = "<p style='color:#444; font-size:12px; text-align:center;'>İlk yorumu sen yap!</p>"; }
        document.getElementById('yorumlar_haber1').innerHTML = h;
        // Otomatik aşağı kaydır
        let list = document.getElementById('yorumlar_haber1');
        list.scrollTop = list.scrollHeight;
    });

    function adminAc() { if(prompt("Şifre:") === "beratadminoldu123") { alert("Admin paneli yakında güncellenecek."); } }
</script>

</body>
</html>

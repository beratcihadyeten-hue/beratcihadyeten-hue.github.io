<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartal Haber | Kalıcı Portal</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --ana: #00ff88; --arka: #0a0a0a; --kart: #161616; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--arka); color: white; margin: 0; padding-bottom: 50px; }
        header { background: #000; padding: 15px 5%; border-bottom: 2px solid var(--ana); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .btn { background: var(--ana); color: black; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; }
        
        /* Haber ve Yorumlar */
        .haber-kart { background: var(--kart); border-radius: 12px; overflow: hidden; border: 1px solid #222; margin-bottom: 30px; }
        .haber-img { width: 100%; height: auto; display: block; }
        .haber-icerik { padding: 20px; }
        .yorum-alani { background: #000; padding: 15px; border-radius: 8px; margin-top: 15px; }
        .yorum-satiri { border-left: 3px solid var(--ana); padding: 5px 10px; margin-bottom: 8px; background: #111; font-size: 14px; }
        .y-ad { color: var(--ana); font-weight: bold; }

        /* Admin Paneli */
        #adminPanel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; padding: 20px; }
        .panel-kutu { max-width: 500px; margin: 50px auto; background: #111; padding: 30px; border-radius: 15px; border: 2px solid var(--ana); }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold; font-size:24px;">KARTAL<span>HUB</span></div>
    <button class="btn" style="background:#222; color:white; font-size:11px;" onclick="adminAc()">ADMİN</button>
</header>

<div class="container">
    <div id="authBox" style="background:var(--kart); padding:20px; border-radius:12px; margin-bottom:20px; border:1px solid #333;">
        <h2 style="margin:0">Taraftar Girişi</h2>
        <input type="text" id="logUser" placeholder="Kullanıcı Adı">
        <input type="password" id="logPass" placeholder="Şifre">
        <button class="btn" style="width:100%" onclick="sistemeGir()">GİRİŞ YAP</button>
    </div>

    <div id="profileBox" style="display:none; background:var(--kart); padding:20px; border-radius:12px; margin-bottom:20px; border-left:5px solid var(--ana);">
        <h2 style="margin:0">Hoş Geldin, <span id="p_ad" style="color:var(--ana)"></span>!</h2>
        <p style="font-size:12px; color:#888;">Yorum yapma yetkisi aktif.</p>
    </div>

    <div id="haberAkisi">
        <article class="haber-kart">
            <img src="https://m.media-amazon.com/images/I/51rDqK-jIEL._AC_UF1000,1000_QL80_.jpg" class="haber-img">
            <div class="haber-icerik">
                <h2>Beşiktaş Yeni Sezona Hazır!</h2>
                <p>Transfer çalışmaları ve hazırlık maçları tüm hızıyla sürüyor.</p>
                
                <div class="yorum-alani">
                    <h4>Yorumlar</h4>
                    <div id="yorumlar_haber1"></div>
                    <div id="yInput_haber1" style="display:none; margin-top:10px;">
                        <input type="text" id="msg_haber1" placeholder="Yorumunuzu yazın...">
                        <button class="btn" onclick="yorumGonder('haber1')">GÖNDER</button>
                    </div>
                </div>
            </div>
        </article>
    </div>
</div>

<div id="adminPanel">
    <div class="panel-kutu">
        <h2>Admin Paneli</h2>
        <div style="background:#000; padding:10px; margin-bottom:10px; border-radius:5px; font-size:13px;">
            <strong>Kayıtlılar:</strong> <span id="userList" style="color:#aaa;">Henüz yok</span>
        </div>
        <input type="text" id="h_baslik" placeholder="Haber Başlığı">
        <input type="text" id="h_resim" placeholder="Resim Linki">
        <textarea id="h_icerik" placeholder="Haber Detayı"></textarea>
        <button class="btn" style="width:100%" onclick="adminHaberEkle()">HABER YAYINLA</button>
        <button class="btn" style="background:red; width:100%; margin-top:10px;" onclick="document.getElementById('adminPanel').style.display='none'">KAPAT</button>
    </div>
</div>

<script>
    // --- SENİN FİRREBASE KODUN ---
    const firebaseConfig = {
      apiKey: "AIzaSyDEbenlp7KcVZ2oE90iEHTTl2oEuGFVGKs",
      authDomain: "kartalhaber-49ae6.firebaseapp.com",
      databaseURL: "https://kartalhaber-49ae6-default-rtdb.firebaseio.com", // Bunu otomatik ekledim
      projectId: "kartalhaber-49ae6",
      storageBucket: "kartalhaber-49ae6.firebasestorage.app",
      messagingSenderId: "804745909398",
      appId: "1:804745909398:web:d4ecaf7174886bbe835eb7",
      measurementId: "G-TV8NLXQTNP"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let aktifUser = null;

    // GİRİŞ / KAYIT
    function sistemeGir() {
        let ad = document.getElementById('logUser').value;
        if(ad.length < 2) return alert("İsim gir!");
        aktifUser = ad;
        
        // Kullanıcıyı veritabanına ekle
        db.ref('users').push(ad);
        
        document.getElementById('authBox').style.display = 'none';
        document.getElementById('profileBox').style.display = 'block';
        document.getElementById('p_ad').innerText = ad;
        document.getElementById('yInput_haber1').style.display = 'block';
    }

    // YORUM GÖNDERME
    function yorumGonder(hId) {
        let m = document.getElementById('msg_' + hId).value;
        if(!m) return;
        db.ref('yorumlar/' + hId).push({ isim: aktifUser, mesaj: m });
        document.getElementById('msg_' + hId).value = "";
    }

    // YORUMLARI ÇEKME
    db.ref('yorumlar/haber1').on('value', (s) => {
        let data = s.val();
        let h = "";
        for(let id in data) {
            h += `<div class="yorum-satiri"><span class="y-ad">${data[id].isim}:</span> ${data[id].mesaj}</div>`;
        }
        document.getElementById('yorumlar_haber1').innerHTML = h;
    });

    // ADMİN
    function adminAc() {
        if(prompt("Şifre:") === "beratadminoldu123") {
            document.getElementById('adminPanel').style.display = 'block';
            db.ref('users').on('value', (s) => {
                let d = s.val();
                let list = [];
                for(let id in d) list.push(d[id]);
                document.getElementById('userList').innerText = list.join(", ");
            });
        }
    }

    function adminHaberEkle() {
        let b = document.getElementById('h_baslik').value;
        let r = document.getElementById('h_resim').value;
        let i = document.getElementById('h_icerik').value;
        // Admin'den eklenen haberler geçicidir, kalıcı yapmak için koda eklemelisin.
        alert("Haber eklendi (Geçici)");
        document.getElementById('adminPanel').style.display = 'none';
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KartalPortal | Mobil & Otomatik</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --ana: #00ff88; --arka: #050505; --kart: #121212; --beyaz: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--arka); color: var(--beyaz); margin: 0; padding: 0; overflow-x: hidden; }
        
        header { background: rgba(0,0,0,0.9); padding: 10px 5%; border-bottom: 2px solid var(--ana); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo { font-weight: 900; font-size: 22px; letter-spacing: -1px; }
        .logo span { color: var(--ana); }

        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }

        /* MOBİL UYUMLU SAYAÇLAR */
        .sayac-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 10px; margin-bottom: 25px; }
        .mac-sayac { padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #222; }
        .bjk-tema { background: linear-gradient(135deg, #000 0%, #333 100%); border-bottom: 4px solid #fff; }
        .gs-tema { background: linear-gradient(135deg, #a90432 0%, #fdb912 100%); border-bottom: 4px solid #fdb912; }
        .fb-tema { background: linear-gradient(135deg, #002d72 0%, #fedd00 100%); border-bottom: 4px solid #fedd00; }
        .sayac-baslik { font-size: 12px; font-weight: 800; margin-bottom: 5px; opacity: 0.9; }
        .sayac-zaman { font-size: 20px; font-weight: 900; font-family: monospace; }

        .auth-container { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .auth-card { background: var(--kart); padding: 20px; border-radius: 15px; border: 1px solid #222; flex: 1; min-width: 100%; box-sizing: border-box; }
        
        .main-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .haber-box { background: var(--kart); border-radius: 15px; overflow: hidden; border: 1px solid #222; margin-bottom: 20px; }
        .haber-img { width: 100%; height: auto; display: block; }
        .haber-text { padding: 20px; }
        
        .yorum-sidebar { background: #0a0a0a; border-radius: 15px; border: 1px solid var(--ana); display: flex; flex-direction: column; height: 500px; }
        .y-header { background: var(--ana); color: #000; padding: 12px; font-weight: bold; text-align: center; border-radius: 13px 13px 0 0; }
        .y-liste { flex-grow: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; font-size: 14px; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn { background: var(--ana); color: #000; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }

        /* TELEFON AYARLARI */
        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
            .auth-card { min-width: 100%; }
            .logo { font-size: 18px; }
            .sayac-zaman { font-size: 18px; }
            header { padding: 10px 3%; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">KARTAL<span>PORTAL</span></div>
    <button class="btn" style="width:auto; font-size:10px; padding:8px 15px;" onclick="adminPanelAc()">ADMİN</button>
</header>

<div class="container">
    <div class="sayac-grid">
        <div class="mac-sayac bjk-tema"><div class="sayac-baslik">🦅 BEŞİKTAŞ</div><div id="bjkTimer" class="sayac-zaman">...</div></div>
        <div class="mac-sayac gs-tema"><div class="sayac-baslik">🦁 GALATASARAY</div><div id="gsTimer" class="sayac-zaman">...</div></div>
        <div class="mac-sayac fb-tema"><div class="sayac-baslik">🟡 FENERBAHÇE</div><div id="fbTimer" class="sayac-zaman">...</div></div>
    </div>

    <div id="authArea" class="auth-container">
        <div class="auth-card">
            <h3 style="margin:0 0 10px 0">🦅 Kayıt/Giriş</h3>
            <input type="text" id="logUser" placeholder="Kullanıcı Adı">
            <input type="password" id="logPass" placeholder="Şifre">
            <div style="display:flex; gap:10px;">
                <button class="btn" onclick="girisYap()">GİRİŞ</button>
                <button class="btn" style="background:#333; color:#fff;" onclick="kayitOl()">KAYIT</button>
            </div>
        </div>
    </div>

    <div class="main-grid">
        <div class="haber-sol" id="haberListesi">
            <article class="haber-box">
                <img src="https://image.fanatik.com.tr/i/fanatik/75/0x410/69ccfef7e558b6bdbdb65150.jpg" class="haber-img">
                <div class="haber-text">
                    <h2 style="margin:0; font-size:20px;">Beşiktaş Antrenman Raporu</h2>
                    <p style="font-size:14px; color:#ccc;">Derbi hazırlıkları Nevzat Demir Tesisleri'nde sürüyor.</p>
                </div>
            </article>
        </div>

        <div class="yorum-sidebar">
            <div class="y-header">CANLI TRİBÜN</div>
            <div class="y-liste" id="yorumListesi_haber1"></div>
            <div id="yInput_haber1" style="display:none; padding:10px; border-top:1px solid #222;">
                <input type="text" id="msg_haber1" placeholder="Mesaj yaz...">
                <button class="btn" onclick="yorumGonder('haber1')">GÖNDER</button>
            </div>
        </div>
    </div>
</div>

<script>
    // FİREBASE (Senin Bilgilerin)
    const firebaseConfig = {
      apiKey: "AIzaSyDEbenlp7KcVZ2oE90iEHTTl2oEuGFVGKs",
      authDomain: "kartalhaber-49ae6.firebaseapp.com",
      databaseURL: "https://kartalhaber-49ae6-default-rtdb.firebaseio.com",
      projectId: "kartalhaber-49ae6",
      storageBucket: "kartalhaber-49ae6.firebasestorage.app",
      messagingSenderId: "804745909398",
      appId: "1:804745909398:web:d4ecaf7174886bbe835eb7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let aktifUser = null;

    // OTOMATİK MAÇ SAATİ SİSTEMİ
    // Bu fonksiyon her takım için bugünden sonraki ilk hafta sonunu otomatik hesaplar.
    function otomatikTarihAl(gunOfset) {
        let d = new Date();
        d.setDate(d.getDate() + (gunOfset + 7 - d.getDay()) % 7);
        d.setHours(20, 0, 0, 0); 
        return d.getTime();
    }

    function guncelleSayaclar() {
        const maclar = [
            { id: "bjkTimer", hedef: otomatikTarihAl(6) }, // Cumartesi
            { id: "gsTimer", hedef: otomatikTarihAl(0) },  // Pazar
            { id: "fbTimer", hedef: otomatikTarihAl(1) }   // Pazartesi
        ];

        maclar.forEach(m => {
            const fark = m.hedef - new Date().getTime();
            if(fark < 0) { document.getElementById(m.id).innerText = "MAÇ BAŞLADI"; return; }
            const g = Math.floor(fark / 86400000);
            const s = Math.floor((fark % 86400000) / 3600000);
            const d = Math.floor((fark % 3600000) / 60000);
            const sn = Math.floor((fark % 60000) / 1000);
            document.getElementById(m.id).innerText = `${g}g ${s}s ${d}m ${sn}s`;
        });
    }
    setInterval(guncelleSayaclar, 1000);

    // DİĞER FONKSİYONLARIN (Giriş, Kayıt, YouTube vb. Aynen Korundu)
    function girisYap() {
        const ad = document.getElementById('logUser').value.trim();
        const sifre = document.getElementById('logPass').value.trim();
        db.ref('users/' + ad).once('value', s => {
            if(s.val() && s.val().sifre === sifre) {
                aktifUser = ad;
                document.getElementById('authArea').innerHTML = `<h3 style="color:var(--ana)">Hoş geldin, ${ad}!</h3>`;
                document.getElementById('yInput_haber1').style.display = 'block';
                yorumlariCek('haber1');
            } else { alert("Hata!"); }
        });
    }

    function kayitOl() {
        const ad = document.getElementById('logUser').value.trim();
        const sifre = document.getElementById('logPass').value.trim();
        if(ad.length < 3) return alert("Kısa isim!");
        db.ref('users/' + ad).set({ sifre: sifre }).then(() => alert("Kayıt Başarılı!"));
    }

    function yorumGonder(hId) {
        const m = document.getElementById('msg_' + hId).value.trim();
        if(m) { db.ref('yorumlar/' + hId).push({ isim: aktifUser, mesaj: m }); document.getElementById('msg_' + hId).value = ""; }
    }

    function yorumlariCek(hId) {
        db.ref('yorumlar/' + hId).on('value', s => {
            let html = "";
            if(s.val()) Object.values(s.val()).forEach(y => html += `<div><b>${y.isim}:</b> ${y.mesaj}</div>`);
            document.getElementById('yorumListesi_' + hId).innerHTML = html;
        });
    }

    function adminPanelAc() {
        if(prompt("Şifre:") === "beratadminoldu123") alert("Admin Paneli Aktif (Konsoldan kullanıcıları görebilirsin)");
    }
    
    // YouTube Otomatik (Senin API Anahtarın)
    fetch(`https://www.googleapis.com/youtube/v3/search?key=AIzaSyD3SXiufKR5EI269yI0hdnA4qPRDcGQK_g&channelId=UCi07VzOQKLNzepjVB1USq4Q&part=snippet,id&order=date&maxResults=1&type=video`)
    .then(res => res.json()).then(data => {
        if(data.items.length > 0) {
            const v = data.items[0];
            const html = `<article class="haber-box"><iframe style="width:100%; aspect-ratio:16/9; border:0;" src="https://www.youtube.com/embed/${v.id.videoId}" allowfullscreen></iframe></article>`;
            document.getElementById('haberListesi').insertAdjacentHTML('afterbegin', html);
        }
    });
</script>
</body>
</html>

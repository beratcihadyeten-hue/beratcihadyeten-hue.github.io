<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol Haber Merkezi | Admin Paneli</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; padding-bottom: 50px; }
        header { background: #000; padding: 15px; border-bottom: 3px solid #00ff88; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .btn { background: #00ff88; color: black; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        
        /* Kayıt Formu */
        #authArea { background: #1e1e1e; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        
        /* Haberler */
        .haber-kart { background: #1e1e1e; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; overflow: hidden; transition: 0.3s; }
        .haber-kart:hover { border-color: #00ff88; }
        .haber-img { width: 100%; height: auto; min-height: 200px; background: #333; object-fit: cover; }
        .haber-icerik { padding: 15px; }
        h2 { color: #00ff88; margin-top: 0; }
        
        /* Admin Paneli */
        #adminPanel { display: none; background: #222; padding: 20px; border: 2px solid #00ff88; border-radius: 10px; margin-top: 20px; }
        .user-list { background: #000; padding: 10px; border-radius: 5px; font-size: 14px; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 20px;">⚽ FUTBOL<span style="color:#00ff88">HUB</span></div>
    <button class="btn" onclick="adminModu()">ADMİN GİRİŞ</button>
</header>

<div class="container">
    <div id="authArea">
        <h3 style="margin-top:0">Haberlere Yorum Yapmak İçin Kayıt Ol</h3>
        <input type="text" id="regUser" placeholder="Kullanıcı Adı">
        <input type="password" id="regPass" placeholder="Şifre">
        <button class="btn" style="width:100%" onclick="kayitOl()">KAYIT OL / GİRİŞ YAP</button>
        <p id="welcomeMsg" style="color:#00ff88; display:none;"></p>
    </div>

    <div id="adminPanel">
        <h2 style="text-align:center">Yönetim Paneli</h2>
        <div class="user-list" id="users">Kayıtlı Kullanıcılar: (Henüz kimse yok)</div>
        <hr color="#333">
        <h3>Yeni Haber Paylaş</h3>
        <input type="text" id="h_baslik" placeholder="Haber Başlığı">
        <input type="text" id="h_resim" placeholder="Resim Linki (URL)">
        <textarea id="h_ozet" rows="4" placeholder="Haber Detayı..."></textarea>
        <button class="btn" style="width:100%" onclick="haberEkle()">HABERİ YAYINLA</button>
    </div>

    <div id="haberAkisi">
        <div class="haber-kart">
            <img src="https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&q=80&w=800" class="haber-img">
            <div class="haber-icerik">
                <h2>Beşiktaş Hazırlıklarına Tam Gaz Devam Ediyor</h2>
                <p>Siyah-beyazlı ekip, hafta sonu oynanacak maç için tesislerde kampa girdi. Teknik direktör galibiyetten emin.</p>
            </div>
        </div>
    </div>
</div>

<script>
    let users = [];

    // Kayıt Fonksiyonu
    function kayitOl() {
        const user = document.getElementById('regUser').value;
        if(user.length < 3) {
            alert("Lütfen geçerli bir isim girin!");
            return;
        }
        users.push(user);
        document.getElementById('authArea').style.display = 'none';
        document.getElementById('welcomeMsg').style.display = 'block';
        document.getElementById('welcomeMsg').innerText = "Hoş geldin, " + user + "! Artık haberleri takip edebilirsin.";
        
        // Admin panelindeki listeyi güncelle
        document.getElementById('users').innerText = "Kayıtlı Kullanıcılar: " + users.join(", ");
    }

    // Admin Paneli Açma
    function adminModu() {
        let sifre = prompt("Admin Şifresini Girin:");
        if(sifre === "beratadminoldu123") {
            document.getElementById('adminPanel').style.display = 'block';
            window.scrollTo(0, document.getElementById('adminPanel').offsetTop);
        } else {
            alert("Yetkisiz Giriş!");
        }
    }

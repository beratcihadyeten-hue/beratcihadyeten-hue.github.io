<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KartalPortal | Premium Taraftar Platformu</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --ana: #00ff88; --arka: #050505; --kart: #121212; --beyaz: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--arka); color: var(--beyaz); margin: 0; overflow-x: hidden; }
        
        header { background: rgba(0,0,0,0.9); padding: 15px 5%; border-bottom: 2px solid var(--ana); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo { font-weight: 900; font-size: 26px; letter-spacing: -1px; }
        .logo span { color: var(--ana); }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }

        /* MAÇ SAYAÇLARI ÜST KISIM */
        .mac-konteynir { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .kart { padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #222; position: relative; overflow: hidden; }
        .bjk { background: linear-gradient(135deg, #000 0%, #222 100%); border-bottom: 4px solid #fff; }
        .gs { background: linear-gradient(135deg, #a90432 0%, #fdb912 100%); border-bottom: 4px solid #fdb912; }
        .fb { background: linear-gradient(135deg, #002d72 0%, #fedd00 100%); border-bottom: 4px solid #fedd00; }
        
        .m-baslik { font-size: 13px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; color: rgba(255,255,255,0.9); }
        .m-rakip { font-size: 15px; font-weight: 700; margin-bottom: 10px; display: block; }
        .m-sure { font-size: 22px; font-weight: 900; font-family: 'Courier New', monospace; letter-spacing: 1px; }

        .main-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; }
        .haber-box { background: var(--kart); border-radius: 20px; overflow: hidden; border: 1px solid #222; margin-bottom: 30px; }
        .haber-img { width: 100%; height: auto; display: block; }
        .haber-text { padding: 25px; }
        
        /* HABER ALTI EDİTÖR BÖLÜMÜ */
        .haber-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .etiket { background: var(--ana); color: #000; padding: 4px 10px; border-radius: 4px; font-weight: bold; font-size: 11px; }
        .editor-footer { margin-top: 15px; border-top: 1px solid #222; padding-top: 10px; color: var(--ana); font-size: 13px; font-weight: bold; }

        .yorum-sidebar { background: #0a0a0a; border-radius: 20px; border: 1px solid var(--ana); display: flex; flex-direction: column; height: 600px; position: sticky; top: 100px; }
        .y-header { background: var(--ana); color: #000; padding: 15px; font-weight: bold; text-align: center; border-radius: 18px 18px 0 0; }
        .y-liste { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .y-item { background: #161616; padding: 10px; border-radius: 8px; border-left: 3px solid var(--ana); font-size: 14px; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        .btn { background: var(--ana); color: #000; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }

        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
            .m-sure { font-size: 18px; }
            .yorum-sidebar { position: relative; top: 0; height: 400px; }
        }

        #adminModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; padding: 40px; }
        .admin-content { max-width: 500px; margin: auto; background: #111; padding: 30px; border-radius: 20px; border: 2px solid var(--ana); }
    </style>
</head>
<body>

<header>
    <div class="logo">KARTAL<span>PORTAL</span></div>
    <button class="btn" style="width:auto; font-size:11px; background:#222; color:#fff;" onclick="adminPanelAc()">ADMİN</button>
</header>

<div class="container">
    <div class="mac-konteynir" id="maclar">
        </div>

    <div class="main-grid">
        <div class="haber-sol" id="haberMain">
            <article class="haber-box">
                <img src="https://image.fanatik.com.tr/i/fanatik/75/0x410/69ccfef7e558b6bdbdb65150.jpg" class="haber-img">
                <div class="haber-text">
                    <div class="haber-meta"><span class="etiket">ANTRENMAN</span></div>
                    <h1>Beşiktaş, Derbi Hazırlıklarına Başladı</h1>
                    <p style="color:#bbb;">Takımımız, sabah saatlerinde Nevzat Demir Tesisleri'nde taktik ağırlıklı bir çalışma gerçekleştirdi.</p>
                    <div class="editor-footer">✍️ Editör: Berat</div>
                </div>
            </article>
        </div>

        <div class="yorum-sidebar">
            <div class="y-header">CANLI TRİBÜN</div>
            <div class="y-liste" id="yorumListesi_haber1"></div>
            <div id="authArea" style="padding:15px; border-top:1px solid #222;">
                <input type="text" id="logUser" placeholder="Adın">
                <input type="password" id="logPass" placeholder="Şifren">
                <button class="btn" onclick="girisYap()">GİRİŞ VE SOHBET</button>
            </div>
            <div id="yInput_haber1" style="display:none; padding:15px; border-top:1px solid #222;">
                <input type="text" id="msg_haber1" placeholder="Mesaj gönder...">
                <button class="btn" onclick="yorumGonder('haber1')">GÖNDER</button>
            </div>
        </div>
    </div>
</div>

<div id="adminModal"><div class="admin-content"><h2 style="color:var(--ana)">Admin Paneli</h2><div id="adminUserList"></div><button class="btn" onclick="document.getElementById('adminModal').style.display='none'">KAPAT</button></div></div>

<script>
    // FİREBASE YAPIN (BOZULMADI)
    const firebaseConfig = {
      apiKey: "AIzaSyDEbenlp7KcVZ2oE90iEHTTl2oEuGFVGKs",
      authDomain: "kartalhaber-49ae6.firebaseapp.com",
      databaseURL: "https://kartalhaber-49ae6-default-rtdb.firebaseio.com",
      projectId: "kartalhaber-49ae6",
      storageBucket: "kartalhaber-49ae6.firebasestorage.app",
      messagingSenderId: "804745909398",
      appId: "1:804745909398:web:d4ecaf7174886bbe835eb7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let aktifUser = null;

    // BURAYI ELLE GÜNCELLEYEBİLİRSİN BERAT
    const MAC_LISTESI = [
        { id: "bjk", ad: "Beşiktaş", rakip: "Fenerbahçe", tarih: "April 12, 2026 20:00:00", stil: "bjk" },
        { id: "gs", ad: "Galatasaray", rakip: "Antalyaspor", tarih: "April 13, 2026 19:00:00", stil: "gs" },
        { id: "fb", ad: "Fenerbahçe", rakip: "Beşiktaş", tarih: "April 12, 2026 20:00:00", stil: "fb" }
    ];

    function maclariGoster() {
        let html = "";
        MAC_LISTESI.forEach(m => {
            html += `<div class="kart ${m.stil}"><div class="m-baslik">🦅 ${m.ad}</div><span class="m-rakip">${m.rakip}</span><div id="${m.id}Timer" class="m-sure">--:--:--</div></div>`;
        });
        document.getElementById('maclar').innerHTML = html;
    }

    function sayacBaslat() {
        MAC_LISTESI.forEach(m => {
            const hedef = new Date(m.tarih).getTime();
            setInterval(() => {
                const simdi = new Date().getTime();
                const fark = hedef - simdi;
                if(fark < 0) { document.getElementById(m.id + "Timer").innerText = "MAÇ BAŞLADI"; return; }
                const g = Math.floor(fark / 86400000);
                const s = Math.floor((fark % 86400000) / 3600000);
                const d = Math.floor((fark % 3600000) / 60000);
                const sn = Math.floor((fark % 60000) / 1000);
                document.getElementById(m.id + "Timer").innerText = `${g}g ${s}s ${d}d ${sn}s`;
            }, 1000);
        });
    }

    maclariGoster();
    sayacBaslat();

    // SOHBET VE ADMİN (BOZULMADI)
    function girisYap() {
        const ad = document.getElementById('logUser').value.trim();
        const sifre = document.getElementById('logPass').value.trim();
        db.ref('users/' + ad).once('value', s => {
            if(s.val() && s.val().sifre === sifre) {
                aktifUser = ad;
                document.getElementById('authArea').innerHTML = `<p style="text-align:center; color:var(--ana); font-weight:bold;">Sohbete Hoş Geldin, ${ad}!</p>`;
                document.getElementById('yInput_haber1').style.display = 'block';
                yorumlariCek('haber1');
            } else alert("Hatalı Giriş!");
        });
    }

    function yorumGonder(hId) {
        const m = document.getElementById('msg_' + hId).value.trim();
        if(m && aktifUser) { db.ref('yorumlar/' + hId).push({ isim: aktifUser, mesaj: m }); document.getElementById('msg_' + hId).value = ""; }
    }

    function yorumlariCek(hId) {
        db.ref('yorumlar/' + hId).on('value', s => {
            let h = "";
            if(s.val()) Object.values(s.val()).forEach(y => h += `<div class="y-item"><b>${y.isim}:</b> ${y.mesaj}</div>`);
            document.getElementById('yorumListesi_' + hId).innerHTML = h;
        });
    }

    function adminPanelAc() {
        if(prompt("Admin Şifresi:") === "beratadminoldu123") {
            document.getElementById('adminModal').style.display = 'block';
            db.ref('users').once('value', s => {
                let h = "";
                for(let i in s.val()) h += `<div style="padding:5px; border-bottom:1px solid #333;">${i} - ${s.val()[i].sifre}</div>`;
                document.getElementById('adminUserList').innerHTML = h;
            });
        }
    }

    // YOUTUBE (BOZULMADI)
    const KANAL_ID = "UC7-saBTRrj6MorxbLf6gVCw";
    fetch(`https://www.googleapis.com/youtube/v3/search?key=AIzaSyD3SXiufKR5EI269yI0hdnA4qPRDcGQK_g&channelId=${KANAL_ID}&part=snippet,id&order=date&maxResults=1&type=video`)
    .then(r => r.json()).then(data => {
        if(data.items && data.items.length > 0) {
            const v = data.items[0];
            const html = `<article class="haber-box"><iframe style="width:100%; aspect-ratio:16/9; border:0;" src="https://www.youtube.com/embed/${v.id.videoId}" allowfullscreen></iframe><div class="haber-text"><div class="haber-meta"><span class="etiket" style="background:red; color:white;">YOUTUBE</span></div><h1>${v.snippet.title}</h1><div class="editor-footer">✍️ Otomatik Yayınlandı</div></div></article>`;
            document.getElementById('haberMain').insertAdjacentHTML('afterbegin', html);
        }
    });
</script>
</body>
</html>
